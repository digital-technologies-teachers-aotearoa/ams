{% load i18n icon %}

<div class="d-flex gap-3">
  <a href="{% url 'organisations:accept_invite' record.invite_token %}"
     class="btn btn-sm btn-success">{% icon "check" %} {% trans "Accept" %}</a>
  <a href="{% url 'organisations:decline_invite' record.invite_token %}"
     class="btn btn-sm btn-secondary">{% icon "x" %} {% trans "Decline" %}</a>
</div>
