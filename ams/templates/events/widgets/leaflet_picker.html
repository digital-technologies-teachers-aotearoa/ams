{% include "django/forms/widgets/multiwidget.html" %}
<div id="leaflet-picker-map"></div>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    var latInput = document.getElementById('id_latitude');
    var lngInput = document.getElementById('id_longitude');

    var defaultLat = parseFloat(latInput.value) || -41.2865;
    var defaultLng = parseFloat(lngInput.value) || 174.7762;
    var defaultZoom = (latInput.value && lngInput.value) ? 13 : 5;

    var map = L.map('leaflet-picker-map').setView([defaultLat, defaultLng], defaultZoom);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors',
      maxZoom: 19,
    }).addTo(map);

    var marker = null;
    if (latInput.value && lngInput.value) {
      marker = L.marker([defaultLat, defaultLng]).addTo(map);
    }

    map.on('click', function(e) {
      var lat = e.latlng.lat.toFixed(6);
      var lng = e.latlng.lng.toFixed(6);
      latInput.value = lat;
      lngInput.value = lng;
      if (marker) {
        marker.setLatLng(e.latlng);
      } else {
        marker = L.marker(e.latlng).addTo(map);
      }
    });
  });
</script>
